<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FR.AI.LIPSHING</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#050816;color:#fff}
header{
display:flex;justify-content:space-between;align-items:center;
padding:20px;background:#0f172a;position:sticky;top:0
}
.logo{
font-size:30px;font-weight:bold;
background:linear-gradient(90deg,#00d4ff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
nav a{
color:#fff;text-decoration:none;margin-left:15px
}
.hero{text-align:center;padding:80px 20px}
.hero h1{font-size:48px;margin-bottom:15px}
.hero p{max-width:700px;margin:auto;color:#cbd5e1}
.btn{
display:inline-block;margin-top:25px;padding:14px 28px;
border-radius:12px;border:none;cursor:pointer;
background:linear-gradient(90deg,#00d4ff,#ff00ff);
color:white;font-weight:bold
}
.section{
padding:30px 20px;
max-width:1000px;
margin:auto;
}
.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}
button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(90deg,#00d4ff,#ff00ff);
color:white;
font-weight:bold;
}
#userInfo{
display:none;
text-align:center;
}
#userPhoto{
width:90px;
height:90px;
border-radius:50%;
margin-bottom:10px;
}
footer{
padding:25px;
text-align:center;
background:#0f172a;
margin-top:30px;
}
</style>
</head>
<body>

<header>
<div class="logo">FR.AI.LIPSHING</div>
<nav>
<a href="#">Home</a>
<a href="#dashboard">Dashboard</a>
</nav>
</header>

<section class="hero">
<h1>AI Lip Sync & Voice Cloning</h1>
<p>
Platform AI untuk membuat video berbicara dari foto dan audio.
</p>
<a href="#dashboard" class="btn">Mulai Gratis</a>
</section>

<div class="section">

<div class="card" id="userInfo">
<img id="userPhoto" alt="Foto Profil">
<h3 id="userName"></h3>
<p id="userEmail"></p>
<br>
<button id="logoutBtn">Logout</button>
</div>

<div class="card">
<h2>Login</h2>
<br>
<button id="loginBtn">Login Google</button>
</div>

<div class="card" id="dashboard">
<h2>🎬 Generate AI Video</h2>
<br>

<label>Upload Foto</label>
<input type="file" id="imageFile" accept="image/*">

<label>Upload Audio</label>
<input type="file" id="audioFile" accept="audio/*">

<button id="generateBtn">Generate Video</button>

<div id="result" style="margin-top:15px"></div>
</div>

<div class="card">
<h2>📊 Statistik</h2>
<p>Video Saya: 0</p>
<p>Paket: FREE</p>
<p>Kredit: 100</p>
</div>

</div>

<footer>
© 2026 FR.AI.LIPSHING
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "GANTI_DENGAN_API_KEY",
  authDomain: "PROJECT.firebaseapp.com",
  projectId: "PROJECT_ID",
  storageBucket: "PROJECT.firebasestorage.app",
  messagingSenderId: "SENDER_ID",
  appId: "APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

loginBtn.addEventListener("click", async () => {
  try{
    await signInWithPopup(auth, provider);
  }catch(e){
    alert(e.message);
  }
});

logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
});

onAuthStateChanged(auth, (user) => {
  if(user){
    document.getElementById("userInfo").style.display = "block";
    document.getElementById("userName").textContent = user.displayName || "";
    document.getElementById("userEmail").textContent = user.email || "";
    document.getElementById("userPhoto").src = user.photoURL || "";
  }else{
    document.getElementById("userInfo").style.display = "none";
  }
});

document.getElementById("generateBtn").addEventListener("click", () => {
  const image = document.getElementById("imageFile").files[0];
  const audio = document.getElementById("audioFile").files[0];

  if(!image || !audio){
    alert("Upload foto dan audio terlebih dahulu.");
    return;
  }

  document.getElementById("result").innerHTML =
    "✅ File berhasil dipilih. Hubungkan ke API Lip Sync untuk menghasilkan video.";
});
</script>

</body>
</html>
